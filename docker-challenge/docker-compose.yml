services:
  client:
    build:
      context: ./client
    container_name: client

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client

  api:
    build:
      context: ./server
    container_name: api
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=123

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    
volumes:
  pgdata: